[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Маркеры
markers =
    integration: тесты требующие реальных внешних сервисов (LLM, 1С, Qdrant)
    slow: медленные тесты (>10 сек)

# Подробный вывод по умолчанию
addopts =
    -v
    -s
    --tb=short
    --no-header
    -p no:warnings

# Логирование
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
